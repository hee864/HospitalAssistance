<!DOCTYPE html>
<html>
<head>
    <title>실시간 영상 스트리밍 및 객체 리스트</title>
    <script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; }
        #video-container { margin-right: 20px; }
        #object-list { width: 300px; background: #f0f0f0; padding: 10px; border-radius: 8px; }
        .object-item { padding: 8px; margin-bottom: 6px; background: white; border-radius: 4px; cursor: pointer; }
        .object-item:hover { background: #d0f0ff; }
        .highlight { background: #a0d8ff !important; }
    </style>
</head>
<body>
    <div id="video-container">
        <h2>실시간 영상 스트리밍</h2>
        <img id="video-stream" width="640" height="480" />
    </div>

    <div id="object-list">
        <h3>탐지 객체 목록</h3>
        <div id="objects"></div>
    </div>

    <script>
        const socket = io();
        const img = document.getElementById('video-stream');
        const objectsDiv = document.getElementById('objects');
        let selectedObjectId = null;
        let lastClickTime = 0;

        // 영상 수신 처리
        socket.on('binary_frame', (data) => {
            try {
                img.src = `data:image/jpeg;base64,${data.image}`;
            } catch (e) {
                console.error('이미지 처리 오류:', e);
            }
        });

        // 객체 리스트 업데이트
        socket.on('detection_list', (objList) => {
            objectsDiv.innerHTML = '';
            objList.forEach(obj => {
                const div = document.createElement('div');
                div.className = 'object-item';
                div.id = `obj-${obj.raw_id}`;  // raw_id를 기준으로 ID 생성
                div.innerHTML = `
                    <strong>${obj.label}</strong><br/>
                    신뢰도: ${obj.score}%<br/>
                    위치: x=${obj.position.x}, y=${obj.position.y}, z=${obj.position.z}
                `;

                // 디바운싱 적용된 클릭 핸들러
                div.onclick = () => {
                    const now = Date.now();
                    if (now - lastClickTime < 300) return; // 300ms 내 재클릭 방지
                    lastClickTime = now;
                    
                    selectObject(obj.raw_id);
                    socket.emit('pick_object', { 
                        id: obj.label,
                        raw_id: obj.raw_id
                    });
                };
                
                objectsDiv.appendChild(div);
            });

            // 기존 선택 상태 유지
            if (selectedObjectId) {
                const el = document.getElementById(`obj-${selectedObjectId}`);
                if (el) el.classList.add('highlight');
            }
        });

        // 서버로부터 선택 확인 응답
        socket.on('selection_acknowledged', (data) => {
            console.log('서버 선택 확인:', data.raw_id);
            selectObject(data.raw_id);
        });

        // 객체 선택 함수 (raw_id 기준)
        function selectObject(raw_id) {
            // 기존 선택 해제
            document.querySelectorAll('.object-item.highlight').forEach(el => {
                el.classList.remove('highlight');
            });
            
            // 새 선택 적용
            const current = document.getElementById(`obj-${raw_id}`);
            if (current) {
                current.classList.add('highlight');
                selectedObjectId = raw_id;
                console.log(`객체 선택됨: ${raw_id}`);
            } else {
                selectedObjectId = null;
            }
        }

        socket.on('connect', () => {
            console.log('웹 클라이언트 연결됨');
        });
    </script>
</body>
</html>
